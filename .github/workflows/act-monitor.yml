name: nektos/act release monitor

on:
  # FIXME: enable schedule in real usage
  # schedule:
  #   - cron: '0 * 2,31 * *'
  #   - cron: '0 0 */2 * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch upstream and local tags
        id: fetch-tags
        run: |
          curl https://api.github.com/repos/nektos/act/releases \
            | tee upstream_releases.json \
            | jq -r '.[].tag_name'

          # echo latest_version="curl -s https://pypi.org/pypi/requests/json \
          #   | jq -r .info.version" \
          #   | tee -a $GITHUB_OUTPUT
          # FIXME: uncomment above and remove below in real usage
          echo latest_version="0.2.52" >> $GITHUB_OUTPUT

      - name: Find the versions to release
        shell: python
        run: |
          import json
          import subprocess
          with open('upstream_releases.json') as f:
            upstream_releases = json.load(f)
          latest_version = "${{ steps.fetch-tags.outputs.latest_version }}"
          tag_found = False
          with open('release_urls.txt', 'w') as f:
            for release in upstream_releases[::-1]:
              if not tag_found and (tag_found := latest_version == release['tag_name'].lstrip('v')):
                continue
              if tag_found:
                f.write(release['url'] + '\n')

      - name: Trigger release workflows
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: xargs -a release_urls.txt -I {} -t gh workflow \
              run release-workflow.yml \
              --ref "${{ github.ref }}" \
              --field release_url="{}"
