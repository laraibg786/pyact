[project]
name = "act"
dynamic = ["version"]
description = "Python wrapper for nektos/act"
readme = "README.md"
requires-python = ">=3"

[project.scripts]
act = "act:main"

[build-system]
requires = ["setuptools>=61", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
include-package-data = true
packages = ["act"]